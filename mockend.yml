models:
  User:
    hasMany: [Recipe, Comment, Rating, RecipeFavorite]
    fake:
      _count: 50
      email: email
      username: username
      password: password
      avatar: { imageURL: [150, 150] }

  Country:
    hasMany: [Recipe]
    fake:
      _count: 20
      name: country
      flag_url: { imageURL: [64, 48] }
      iso_alpha3: countryCode

  Recipe:
    belongsTo: [User, Country]
    hasMany: [Comment, Rating, Step, RecipeIngredient, RecipeFavorite]
    fake:
      _count: 100
      name: phrase
      description: paragraph
      photo_url: { imageURL: [600, 400] }

  Comment:
    belongsTo: [User, Recipe]
    fake:
      _count: 200
      title: sentence
      description: paragraph

  Rating:
    belongsTo: [User, Recipe]
    fake:
      _count: 300
      value: { int: [1, 5] }

  Step:
    belongsTo: [Recipe]
    fake:
      _count: 400
      name: phrase
      description: sentence
      order: { int: [1, 10] }

  Ingredient:
    hasMany: [RecipeIngredient]
    fake:
      _count: 100
      name: word

  RecipeIngredient:
    belongsTo: [Recipe, Ingredient]
    fake:
      _count: 500
      amount: phrase

  RecipeFavorite:
    belongsTo: [Recipe, User]
    fake:
      _count: 150
      created_at: { dateTime: [2024-01-01T00:00:00Z, 2026-06-13T00:00:00Z] }
